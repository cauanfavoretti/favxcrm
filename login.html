<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAVX CRM — Entrar</title>
  <link rel="stylesheet" href="assets/css/auth.css" />
  <style>
    #intro-wrap{position:fixed;inset:0;z-index:9999;overflow:hidden;display:none;
      background:radial-gradient(120% 120% at 50% 52%,#03040c 0%,#000004 60%,#000 100%)}
    .i-light{position:absolute;left:50%;top:52%;width:140vmax;height:140vmax;
      transform:translate(-50%,-50%) scale(var(--ls,.35));
      background:radial-gradient(circle at 50% 50%,
        rgba(110,150,255,calc(var(--li,0)*.55)) 0%,rgba(50,86,220,calc(var(--li,0)*.42)) 9%,
        rgba(24,46,150,calc(var(--li,0)*.30)) 20%,rgba(12,24,90,calc(var(--li,0)*.16)) 34%,
        rgba(6,12,48,0) 56%);filter:blur(8px);pointer-events:none}
    .i-haze{position:absolute;left:50%;top:50%;width:90vmax;height:60vmax;
      transform:translate(-50%,-50%);mix-blend-mode:screen;pointer-events:none;
      background:radial-gradient(circle at 50% 45%,rgba(40,72,200,calc(var(--li,0)*.22)) 0%,rgba(14,28,100,0) 60%);
      animation:i-drift 14s ease-in-out infinite alternate}
    @keyframes i-drift{from{transform:translate(-52%,-50%) scale(1)}to{transform:translate(-48%,-52%) scale(1.08)}}
    .i-logo{position:absolute;left:50%;top:50%;width:clamp(180px,28vw,440px);height:auto;
      transform:translate(-50%,-50%) translateY(14px) scale(.965);
      opacity:.04;filter:brightness(.12);
      user-select:none;pointer-events:none;z-index:3;
      will-change:opacity,filter,transform}
    .i-bloom{position:absolute;left:50%;top:52%;width:60vmax;height:60vmax;border-radius:50%;
      transform:translate(-50%,-50%) scale(.6);opacity:0;z-index:4;pointer-events:none;mix-blend-mode:screen;
      background:radial-gradient(circle at 50% 50%,rgba(232,240,255,.95) 0%,rgba(150,180,255,.6) 22%,rgba(60,100,240,.25) 42%,rgba(20,40,140,0) 62%)}
    .i-vignette{position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(110% 90% at 50% 50%,rgba(0,0,0,0) 42%,rgba(0,0,0,.72) 100%)}
    .i-whiteout{position:absolute;inset:0;z-index:20;pointer-events:none;opacity:0;
      background:radial-gradient(circle at 50% 50%,#fff 0%,#f5f8ff 64%,#eef3ff 100%)}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <div style="display:flex;flex-direction:column;align-items:center;width:100%">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo-wrap">
        <img src="assets/img/fx-logo.png" alt="FAVX" />
      </div>

      <div class="auth-card-header">
        <h2>Entrar na sua conta</h2>
        <p>Acesso restrito a usuários cadastrados.</p>
      </div>

      <!-- FORMULÁRIO LOGIN -->
      <form class="auth-form" id="formLogin" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label for="loginEmail">E-mail</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M2.5 5.5A1.5 1.5 0 014 4h12a1.5 1.5 0 011.5 1.5v9A1.5 1.5 0 0116 16H4a1.5 1.5 0 01-1.5-1.5v-9z" stroke="currentColor" stroke-width="1.4"/><path d="M2.5 6l7.5 5.5L17.5 6" stroke="currentColor" stroke-width="1.4"/></svg>
            <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email" required />
          </div>
        </div>

        <div class="form-group">
          <label for="loginPassword">
            Senha
            <a href="#" class="forgot-link" onclick="showForgot(event)">Ops, esqueci minha senha</a>
          </label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.4"/></svg>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pwd" onclick="togglePassword('loginPassword', this)">
              <svg viewBox="0 0 20 20" fill="none"><path d="M2 10s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" />
            <span class="checkbox-custom"></span>
            Lembrar-me por 30 dias
          </label>
        </div>

        <button type="submit" class="btn-primary" id="btnLogin">
          <span class="btn-text">Entrar</span>
          <span class="btn-spinner" hidden>
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="32" stroke-dashoffset="12" class="spin"/></svg>
          </span>
        </button>

        <div class="auth-error" id="loginError" hidden></div>
      </form>

      <!-- RECUPERAR SENHA -->
      <div class="auth-form" id="formForgot" hidden>
        <button class="back-btn" onclick="showForgot(null, true)">
          <svg viewBox="0 0 20 20" fill="none"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Voltar ao login
        </button>
        <div class="forgot-header">
          <h3>Recuperar senha</h3>
          <p>Informe seu e-mail cadastrado e enviaremos um link de redefinição.</p>
        </div>
        <div class="form-group">
          <label for="forgotEmail">E-mail</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M2.5 5.5A1.5 1.5 0 014 4h12a1.5 1.5 0 011.5 1.5v9A1.5 1.5 0 0116 16H4a1.5 1.5 0 01-1.5-1.5v-9z" stroke="currentColor" stroke-width="1.4"/><path d="M2.5 6l7.5 5.5L17.5 6" stroke="currentColor" stroke-width="1.4"/></svg>
            <input type="email" id="forgotEmail" placeholder="seu@email.com" />
          </div>
        </div>
        <button class="btn-primary" onclick="handleForgot()">
          <span class="btn-text">Enviar link de recuperação</span>
        </button>
        <div class="auth-success" id="forgotSuccess" hidden>
          Link enviado! Verifique sua caixa de entrada.
        </div>
        <div class="auth-error" id="forgotError" hidden></div>
      </div>

    </div>

    <p class="auth-footer-text">&copy; 2026 FAVX. Todos os direitos reservados.</p>
  </div>

  <!-- Intro overlay (ativado após login bem-sucedido) -->
  <div id="intro-wrap">
    <div class="i-light" id="i-light"></div>
    <div class="i-haze"></div>
    <img  class="i-logo" src="assets/img/fx-logo.png" alt="FAVX" draggable="false" id="i-logo" />
    <div class="i-bloom" id="i-bloom"></div>
    <div class="i-vignette"></div>
    <div class="i-whiteout" id="i-whiteout"></div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
