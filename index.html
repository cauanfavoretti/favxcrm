<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAVX CRM</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>

  <style>
    /* ── INTRO OVERLAY ──────────────────────────────────── */
    #intro-wrap {
      position: fixed; inset: 0; z-index: 9999; overflow: hidden; cursor: default;
      background: radial-gradient(120% 120% at 50% 52%, #03040c 0%, #000004 60%, #000 100%);
    }
    .i-light {
      position: absolute; left: 50%; top: 52%;
      width: 140vmax; height: 140vmax;
      transform: translate(-50%,-50%) scale(var(--ls,0.35));
      background: radial-gradient(circle at 50% 50%,
        rgba(110,150,255,calc(var(--li,0)*0.55)) 0%,
        rgba(50,86,220,calc(var(--li,0)*0.42)) 9%,
        rgba(24,46,150,calc(var(--li,0)*0.30)) 20%,
        rgba(12,24,90,calc(var(--li,0)*0.16)) 34%,
        rgba(6,12,48,0) 56%);
      filter: blur(8px); pointer-events: none; will-change: transform;
    }
    .i-haze {
      position: absolute; left: 50%; top: 50%;
      width: 90vmax; height: 60vmax;
      transform: translate(-50%,-50%);
      background: radial-gradient(circle at 50% 45%,
        rgba(40,72,200,calc(var(--li,0)*0.22)) 0%, rgba(14,28,100,0) 60%);
      mix-blend-mode: screen; pointer-events: none;
      animation: i-drift 14s ease-in-out infinite alternate;
    }
    @keyframes i-drift {
      from { transform: translate(-52%,-50%) scale(1); }
      to   { transform: translate(-48%,-52%) scale(1.08); }
    }
    .i-bloom {
      position: absolute; left: 50%; top: 52%;
      width: 60vmax; height: 60vmax;
      transform: translate(-50%,-50%) scale(0.6); border-radius: 50%;
      background: radial-gradient(circle at 50% 50%,
        rgba(232,240,255,0.95) 0%, rgba(150,180,255,0.6) 22%,
        rgba(60,100,240,0.25) 42%, rgba(20,40,140,0) 62%);
      opacity: 0; z-index: 4; pointer-events: none;
      mix-blend-mode: screen; will-change: opacity,transform;
    }
    .i-vignette {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(110% 90% at 50% 50%, rgba(0,0,0,0) 42%, rgba(0,0,0,0.72) 100%);
    }
    .i-whiteout {
      position: absolute; inset: 0; z-index: 20; pointer-events: none; opacity: 0;
      background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f5f8ff 64%, #eef3ff 100%);
    }
    .i-logo {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%) translateY(calc((1 - var(--g,0)) * 14px)) scale(calc(0.965 + var(--g,0)*0.035));
      width: clamp(180px, 28vw, 440px); height: auto;
      user-select: none; pointer-events: none;
      opacity: calc(0.04 + var(--g,0)*0.96);
      filter:
        brightness(calc(0.12 + var(--g,0)*0.88))
        drop-shadow(0 0 calc(var(--g,0)*26px) rgba(95,140,255,calc(var(--g,0)*0.85)))
        drop-shadow(0 0 calc(var(--g,0)*64px) rgba(39,71,214,calc(var(--g,0)*0.6)))
        drop-shadow(0 0 calc(var(--g,0)*120px) rgba(20,40,140,calc(var(--g,0)*0.4)));
      z-index: 3; will-change: opacity,filter,transform;
    }
    @media (prefers-reduced-motion: reduce) { .i-haze { animation: none; } }
  </style>
</head>
<body>

    <div class="sidebar-logo">
      <div class="logo-icon">
        <img src="assets/img/favx-logo.png" alt="FAVX Logo" style="height:160px;width:auto;object-fit:contain;filter:invert(1);mix-blend-mode:screen;" />
      </div>
      <button class="sidebar-toggle" id="sidebarToggle">
        <i data-lucide="chevrons-left"></i>
      </button>
    </div>

    <div style="padding:0 12px 12px">
      <a href="#" class="nav-item nav-admin-only" data-page="subaccounts"

        <i data-lucide="building-2" style="width:16px;height:16px"></i>
        <span>Subcontas</span>

    </div>

    <div class="sidebar-section-label">Principal</div>
    <nav class="sidebar-nav">

      <a href="#" class="nav-item" data-page="contacts">

      </a>
      <a href="#" class="nav-item" data-page="funnels">

    <div class="sidebar-section-label">Inteligência Artificial</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item" data-page="agents">
        <i data-lucide="cpu"></i>
        <span>Agentes de IA</span>
        <span class="nav-badge-green">3 ativos</span>
      </a>
      <a href="#" class="nav-item" data-page="ai-dashboard">
        <i data-lucide="activity"></i>
        <span>Painel da IA</span>
      </a>
      <a href="#" class="nav-item" data-page="automations">
        <i data-lucide="zap"></i>
        <span>Automações</span>
      </a>
    </nav>

    <div class="sidebar-section-label">Configurações</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item" data-page="settings">
        <i data-lucide="settings"></i>
        <span>Configurações</span>
      </a>
      <a href="#" class="nav-item" data-page="integrations">
        <i data-lucide="plug"></i>
        <span>Integrações</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <span class="user-name">Admin FAVX</span>
          <span class="user-role">Super Admin</span>
        </div>
        <button id="logoutBtn" title="Sair" style="background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;transition:background 0.15s" onmouseenter="this.style.background='rgba(255,255,255,0.12)'" onmouseleave="this.style.background='none'">
          <i data-lucide="log-out" style="width:15px;height:15px;color:rgba(255,255,255,0.4)"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN WRAPPER -->
  <div class="main-wrapper" id="mainWrapper">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <i data-lucide="menu"></i>
        </button>
        <div class="breadcrumb" id="breadcrumb">
          <span>Dashboard</span>
        </div>
        <div style="position:relative;margin-left:8px" id="subaccountSwitcherWrap">
          <button id="subaccountSwitcherBtn" style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-surface);cursor:pointer;color:var(--color-text-2)">
            <i data-lucide="building-2" style="width:13px;height:13px"></i>
            <span id="subaccountSwitcherName">—</span>
            <i data-lucide="chevron-down" style="width:13px;height:13px"></i>
          </button>
          <div id="subaccountSwitcherMenu" hidden style="position:absolute;top:calc(100% + 6px);left:0;min-width:200px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:999;padding:6px 0">
            <!-- populado via JS -->
          </div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-wrapper">
          <i data-lucide="search"></i>
          <input type="text" placeholder="Buscar contatos, conversas..." />
        </div>
        <button class="theme-toggle-btn" id="themeToggleBtn" title="Alternar tema">
          <i data-lucide="sun" id="themeIcon" style="width:18px;height:18px"></i>
        </button>
        <div style="position:relative" id="notifWrap">
          <button class="topbar-btn" id="notifBtn">
            <i data-lucide="bell"></i>
            <span class="notif-badge" id="notifBadge" style="display:none">0</span>
          </button>
          <div id="notifDropdown" style="display:none;position:absolute;top:calc(100% + 8px);right:0;width:320px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);box-shadow:0 8px 28px rgba(0,0,0,0.14);z-index:999;overflow:hidden">
            <div style="padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--color-border)">
              <span style="font-size:13px;font-weight:700;color:var(--color-text-1)">Notificações</span>
              <button id="readAllBtn" style="font-size:11px;color:var(--color-accent);background:none;border:none;cursor:pointer;font-weight:600;padding:0">Marcar tudo como lido</button>
            </div>
            <div id="notifList" style="max-height:380px;overflow-y:auto">
              <div style="padding:24px;text-align:center;color:var(--color-text-3);font-size:13px">Sem notificações</div>
            </div>
          </div>
        </div>
        <button class="topbar-btn">
          <i data-lucide="help-circle"></i>
        </button>
        <div class="topbar-avatar">A</div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="page-content" id="pageContent">
      <!-- Injected via JS -->
    </main>

  </div>

  <!-- ── INTRO OVERLAY (aparece sobre o CRM ao fazer login) ── -->
  <div id="intro-wrap">
    <div class="i-light"    id="i-light"></div>
    <div class="i-haze"></div>
    <img  class="i-logo"    id="i-logo" src="assets/img/fx-logo.png" alt="FAVX" draggable="false" />
    <div class="i-bloom"    id="i-bloom"></div>
    <div class="i-vignette"></div>
    <div class="i-whiteout" id="i-whiteout"></div>
    <audio id="i-audio" preload="auto"></audio>
  </div>

  <script>
  // Resolved when the intro overlay is removed; app.js waits on this before showing pickers.
  window.__favxIntroPromise = new Promise(resolve => { window.__favxIntroResolve = resolve; });

  (function(){
    const TRACKS = ['/assets/audio/riser-1.mp3', '/assets/audio/riser-2.mp3'];

    const lightEl = document.getElementById('i-light');
    const logoEl  = document.getElementById('i-logo');
    const bloomEl = document.getElementById('i-bloom');
    const whiteEl = document.getElementById('i-whiteout');
    const audio   = document.getElementById('i-audio');

    function pickTrack(){
      let last = -1;
      try { last = parseInt(localStorage.getItem('favx_last_track')); } catch(e){}
      const pool = TRACKS.length > 1 ? TRACKS.map((_,i)=>i).filter(i=>i!==last) : [0];
      const idx  = pool[Math.floor(Math.random()*pool.length)];
      try { localStorage.setItem('favx_last_track', idx); } catch(e){}
      return TRACKS[idx];
    }

    const clamp  = (v,a,b) => Math.max(a,Math.min(b,v));
    const smooth = t => t*t*(3-2*t);
    const band   = (p,s,e) => clamp((p-s)/(e-s),0,1);

    let running = false, rafId = null, useTime = true;
    let fallbackStart = 0, audioOK = false, finished = false;
    const FALLBACK_DUR = 9;

    // Pre-load the chosen track immediately so it's ready when start() runs
    const _preTrack = pickTrack();
    audio.src = _preTrack;
    audio.load();

    function reset(){
      lightEl.style.setProperty('--li', 0);
      lightEl.style.setProperty('--ls', 0.35);
      logoEl.style.setProperty('--g', 0);
      bloomEl.style.opacity = 0;
      bloomEl.style.transform = 'translate(-50%,-50%) scale(0.6)';
      whiteEl.style.opacity = 0;
    }

    function render(p){
      const li = smooth(clamp(p*1.05,0,1));
      lightEl.style.setProperty('--li', (0.15+li*0.95).toFixed(3));
      lightEl.style.setProperty('--ls', (0.35+smooth(p)*0.95).toFixed(3));

      let g = smooth(band(p,0.12,0.82));
      if (p > 0.80) g = Math.max(g, 0.7 + smooth(band(p,0.80,0.95))*0.3);
      logoEl.style.setProperty('--g', g.toFixed(3));

      const b    = band(p,0.80,0.96);
      const fade = band(p,0.90,1.0);
      bloomEl.style.opacity   = (smooth(b)*(1-smooth(fade)*0.82)).toFixed(3);
      bloomEl.style.transform = 'translate(-50%,-50%) scale('+(0.6+smooth(b)*0.9).toFixed(3)+')';
      whiteEl.style.opacity   = smooth(band(p,0.90,1.0)).toFixed(3);
    }

    function revealCRM(){
      if (finished) return;
      finished = true;
      const wrap = document.getElementById('intro-wrap');
      if (!wrap) { window.__favxIntroResolve?.(); return; }
      wrap.style.transition = 'opacity 0.65s ease';
      wrap.style.opacity = '0';
      setTimeout(() => {
        if (wrap.parentNode) wrap.parentNode.removeChild(wrap);
        window.__favxIntroResolve?.();
      }, 700);
    }

    function finish(){
      running = false; audioOK = true;
      cancelAnimationFrame(rafId);
      render(1);
      setTimeout(revealCRM, 250);
    }

    function loop(){
      const p = (useTime && isFinite(audio.duration) && audio.duration > 0)
        ? clamp(audio.currentTime/audio.duration,0,1)
        : clamp((performance.now()-fallbackStart)/1000/FALLBACK_DUR,0,1);
      render(p);
      if (p >= 1 && running && !useTime){ finish(); return; }
      rafId = requestAnimationFrame(loop);
    }

    function start(){
      if (running) return;
      running = true; finished = false;
      reset();
      // src already preloaded; reset position
      audio.currentTime = 0;
      useTime = true; fallbackStart = performance.now();
      const pp = audio.play();
      if (pp && pp.then) pp.then(()=>{ audioOK=true; }).catch(()=>{ useTime=false; fallbackStart=performance.now(); });
      audio.onended = finish;
      cancelAnimationFrame(rafId);
      loop();
    }

    start();

    function onGesture(){
      if (!audioOK && !finished){
        // Sync audio to current animation progress instead of restarting
        const elapsed = clamp((performance.now() - fallbackStart) / 1000, 0, FALLBACK_DUR);
        if (isFinite(audio.duration) && audio.duration > 0) {
          audio.currentTime = clamp(elapsed, 0, audio.duration);
        }
        const pp = audio.play();
        if (pp && pp.then) pp.then(() => { audioOK = true; useTime = true; }).catch(() => {});
      }
      window.removeEventListener('pointerdown', onGesture);
      window.removeEventListener('keydown',     onGesture);
      window.removeEventListener('touchstart',  onGesture);
    }
    window.addEventListener('pointerdown', onGesture);
    window.addEventListener('keydown',     onGesture);
    window.addEventListener('touchstart',  onGesture, {passive:true});
  })();
  </script>

  <script src="assets/js/pages/dashboard.js"></script>
  <script src="assets/js/pages/contacts.js"></script>
  <script src="assets/js/pages/conversations.js"></script>
  <script src="assets/js/pages/funnels.js"></script>
  <script src="assets/js/pages/agents.js"></script>
  <script src="assets/js/pages/ai-dashboard.js"></script>
  <script src="assets/js/pages/automations.js"></script>
  <script src="assets/js/pages/settings.js"></script>
  <script src="assets/js/pages/integrations.js"></script>
  <script src="assets/js/pages/subaccounts.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
